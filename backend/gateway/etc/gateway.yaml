Name: gateway
Host: 0.0.0.0
Port: 4000
MaxBytes: 10485760   # 允许 10MB 上传


# 新增MySQL数据库配置（GORM用）
Mysql:
  Dsn: "root:trp445566@tcp(192.168.227.128:2881)/soccer?charset=utf8mb4&parseTime=True&loc=Local" # 数据库DSN
  MaxOpenConns: 100 # 最大打开连接数
  MaxIdleConns: 20  # 最大空闲连接数
  MaxLifetime: 3600 # 连接最大存活时间（秒）
  MaxIdleTime: 1800 # 连接最大空闲时间（秒）

# 图片上传服务
UploadRpc:
  Endpoints:
    - 127.0.0.1:8888          # Upload RPC 服务地址（开发环境直连）
  NonBlock: true

# 静态文件服务
StaticFile:
  SavePath: "../static/images"              # 与 RPC 服务保持一致的存储根目录
  UrlPrefix: "/uploads"                    # URL 访问前缀

# JWT 认证配置
Auth:
  AccessSecret: "soccer-gateway-jwt-secret-key-2026-change-in-production"  # ⚠️ 生产环境请更换为强随机字符串
  AccessExpire: 7200        # AccessToken 有效期（秒），默认 2 小时
  RefreshExpire: 604800     # RefreshToken 有效期（秒），默认 7 天
  Issuer: "soccer-gateway"  # 签发者标识